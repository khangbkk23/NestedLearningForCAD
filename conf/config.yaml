dataset:
  name: "mvtec"
  root_dir: "data/mvtec"
  img_size: 256
  batch_size: 32
  num_workers: 4
  split_ratio: 0.8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  use_dtd: true
  dtd_dir: "data/dtd/images"
  anomaly_generator: "superpixel"   # or "perlin", "destseg", "realnet", "mixed"
  class_order: [
    "bottle", "cable", "capsule", "carpet", "grid", 
    "hazelnut", "leather", "metal_nut", "pill", "screw", 
    "tile", "toothbrush", "transistor", "wood", "zipper"
  ]

model:
  backbone: "vit_small_patch14_dinov2.lvd142m"
  pretrained: true
  freeze_backbone: true
  prompt_length: 8
  prompt_layers: 4
  prompt_dropout: 0.05
  gating_hidden_dim: 256
  gating_dropout: 0.1
  gating_threshold: 0.55
  use_torchhub_fallback: true
  torchhub_model: "dinov2_vits14"

memory:
  coreset_sampling_ratio: 0.01
  nearest_neighbors: 9
  distance_metric: "cosine" 

training:
  optimizer: "adamw"
  scheduler: "cosine" 
  learning_rate: 0.0001
  weight_decay: 0.00001
  epochs_per_task: 10
  task_type: "anomaly"
  pixel_loss_weight: 0.2
  acc_loss_weight: 0.5
  proxy_loss_weight: 0.5
  ln_loss_weight: 0.1
  gradient_clip_norm: 1.0

  titans_bank_size: 8192
  titans_k_neighbors: 8
  slow_memory_size: 2048

  nsp2_svd_tol: 0.000001
  nsp2_svd_rel_tol: 0.0001

  cbp_patience: 50
  cbp_activation_threshold: 0.00001

  use_replay: false
  replay_batch_size: 32
  
  device: "cuda"
  seed: 42

logging:
  experiment_name: "vit_cms_hybrid_cad"
  results_dir: "results"
  runs_subdir: "runs"
  save_models: true
  log_frequency: 10
  use_wandb: false
  wandb_project: "nested-learning-for-cad"
  wandb_entity: null