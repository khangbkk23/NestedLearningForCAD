dataset:
  name: "mvtec"
  root_dir: "data/mvtec"
  img_size: 224
  batch_size: 32
  num_workers: 4
  split_ratio: 0.8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  use_dtd: true
  dtd_dir: "data/dtd/images"
  anomaly_generator: "superpixel" # or "perlin", "destseg", "realnet", "mixed"
  class_order:
    [
      "bottle",
      "cable",
      "capsule",
      "carpet",
      "grid",
      "hazelnut",
      "leather",
      "metal_nut",
      "pill",
      "screw",
      "tile",
      "toothbrush",
      "transistor",
      "wood",
      "zipper",
    ]

model:
  backbone: "facebook/dinov2-base"
  embed_dim: 768
  tau_acc: 0.6
  max_coreset_size: 1000
  n_patch: null
  store_images: false

memory:
  coreset_sampling_ratio: 0.01
  nearest_neighbors: 9
  distance_metric: "cosine"

training:
  optimizer: "adamw"
  scheduler: "cosine"
  learning_rate: 0.0001
  weight_decay: 0.00001
  epochs_per_task: 1
  stream_repeats: 1
  task_type: "anomaly"
  pixel_loss_weight: 0.2
  use_replay: false
  replay_batch_size: 32

  kd_loss_weight: 1.0

  device: "cuda"
  seed: 42

logging:
  experiment_name: "MetaNATH_Phase1_2"
  results_dir: "results/"
  save_models: true
  checkpoint_mode: "phase12_light" # "phase12_light" or "phase3_full"
  checkpoint_policy: "last_only" # "all", "last_only", "best_and_last", or "none"
  log_frequency: 10
  use_wandb: true
  wandb_project: "MetaNATH-CAD"
  wandb_entity: null

evaluation:
  mode: "current" # "current" or "cumulative"
  cumulative_frequency: 5
  final_cumulative: true
  pixel_sample_limit: 10000
  pixel_score_norm: "none" # "none", "minmax", or "robust_z"
  gaussian_smoothing_sigma: 0.0
  forgetting_matrix: false
  forgetting_metric: "image_auroc"
