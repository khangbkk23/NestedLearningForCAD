dataset:
  name: "visa"
  root_dir: "data/visa"
  img_size: 224
  batch_size: 32
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true
  drop_last_train: false
  split_ratio: 0.8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  use_dtd: true
  dtd_dir: "data/dtd/images"
  anomaly_generator: "superpixel"
  class_order:
    [
      "candle",
      "capsules",
      "cashew",
      "chewinggum",
      "fryum",
      "macaroni1",
      "macaroni2",
      "pcb1",
      "pcb2",
      "pcb3",
      "pcb4",
      "pipe_fryum",
    ]

model:
  backbone: "facebook/dinov2-base"
  embed_dim: 768
  tau_acc: 0.6
  max_coreset_size: 1000
  n_patch: null
  store_images: true

memory:
  coreset_sampling_ratio: 0.01
  nearest_neighbors: 9
  distance_metric: "cosine"

training:
  optimizer: "adamw"
  scheduler: "cosine"
  learning_rate: 0.0001
  weight_decay: 0.00001
  epochs_per_task: 1
  stream_repeats: 1
  task_type: "anomaly"
  pixel_loss_weight: 0.2
  use_replay: false
  replay_batch_size: 32
  kd_loss_weight: 1.0
  device: "cuda"
  seed: 42

logging:
  experiment_name: "MetaNATH_ViSA_MaxPower"
  results_dir: "results/"
  save_models: true
  checkpoint_mode: "phase3_full"
  checkpoint_policy: "last_only"
  log_frequency: 10
  use_wandb: false
  wandb_project: "MetaNATH-CAD"
  wandb_entity: null

evaluation:
  mode: "current"
  cumulative_frequency: 5
  final_cumulative: true
  pixel_sample_limit: 10000
  pixel_score_norm: "none"
  gaussian_smoothing_sigma: 0.0
  forgetting_matrix: true
  forgetting_metric: "image_auroc"

phase3:
  enabled: true
  top_k_anchors: 128
  unfreeze_last_blocks: 2
  drift_threshold: 0.05
  grad_clip: 0.75
  distill_weight: 0.5
  patch_distill_weight: 5.0
  lejepa_weight: 0.1
  lr: 0.000002
  weight_decay: 0.01
  steps: 2
  balanced_anchors: true
  refresh_coreset: true
  refresh_batch_size: 32
  acceptance:
    enabled: true
    primary_metric: "final_cumulative_pixel_aupr"
    min_primary_delta: -0.005
    image_metric: "final_cumulative_image_auroc"
    min_image_delta: -0.002

nsp2:
  enabled: true
  energy_threshold: 0.99
  min_null_dim: 64
  recycling_enabled: true
  fallback_null_dims: [64, 32, 16]

cbp:
  enabled: true
  monitor_only: false
  threshold: 0.01
  reinit_std: 0.02
